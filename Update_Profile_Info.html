<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Page1</title>
  <style>
    body { background-color: #1fcecb; text-align: center; }
    h3 { color: black; text-align: left; max-width: 420px; margin: 0.8rem auto; }
    h4 { color: black; font-weight: bold; }
    label { color: black; font-weight: bold; }
    form { background-color: grey; padding: 30px; border-radius: 10px; max-width: 420px; margin: auto; }
    hr { border-color: green; border-width: 3px; }
    input { background-color: blue; color: white; }
    button { background-color: #4CAF50; }
    .msg { max-width: 420px; margin: 0.5rem auto; font-weight: bold; }
  </style>
</head>
<body>
  {% include "Nav.html" %}
  <h3>Edit Profile Information:</h3>
  <h5>Hello you can update the following information below:</h5>
  {% if feedback %}
    {% if ok %}<p class="msg" style="color: green;">{{ feedback }}</p>{% else %}<p class="msg" style="color: darkred;">{{ feedback }}</p>{% endif %}
  {% endif %}
  <form action="/Update_Profile_Info" method="post">
    <input type="hidden" name="client_id" value="{{ form_data.client_id }}">
    <h4>Personal Information:</h4>
    <label for="fname">First Name</label><br>
    <input type="text" id="fname" name="fname" value="{{ form_data.fname }}"><br><br>
    <label for="lname">Last name</label><br>
    <input type="text" id="lname" name="lname" value="{{ form_data.lname }}"><br><br>
    <label for="dob">Date of Birth</label><br>
    <input type="date" id="dob" name="dob" value="{{ form_data.dob }}" /><br><br>
    <hr>
    <h4>Contact Information</h4>
    <label for="mail">Email</label><br>
    <input type="email" id="mail" name="mail" value="{{ form_data.mail }}" /><br><br>
    <label for="phone">Phone Number</label><br>
    <input type="tel" id="phone" name="phone" value="{{ form_data.phone }}" /><br><br>
    <label for="pwd">Password (UI only)</label><br>
    <input type="password" id="pwd" name="pwd" /><br><br>
    <label for="confirm_pwd">Password (verification)</label><br>
    <input type="password" id="confirm_pwd" name="confirm_pwd" /><br><br>
    <hr>
    <h4>Address Information</h4>
    <label for="street">Street Name</label><br>
    <input type="text" id="street" name="street" value="{{ form_data.street }}" /><br><br>
    <label for="city">City</label><br>
    <input type="text" id="city" name="city" value="{{ form_data.city }}" /><br><br>
    <label for="state">State</label><br>
    <input type="text" id="state" name="state" value="{{ form_data.state }}" /><br><br>
    <label for="zip">Zip Code</label><br>
    <input id="zip" name="zip" type="text" value="{{ form_data.zip }}"><br><br>
    <button type="submit">Save Changes!</button>
  </form>
</body>
</html>
